name: iAquaLink Pool & Weather Logger

on:
  repository_dispatch:
    types: [poll-pool]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        # Added 'requests' for the weather scraper
        run: pip install pandas pytz aiohttp httpx requests iaqualink==0.6.0 --force-reinstall

      - name: Run Telemetry Suite
        env:
          IQUALINK_USER: ${{ secrets.IQUALINK_USER }}
          IQUALINK_PASS: ${{ secrets.IQUALINK_PASS }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          LAT: ${{ secrets.LAT }}
          LONG: ${{ secrets.LONG }}
        run: python main.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "PoolBot"
          git config --global user.email "poolbot@github.com"
          # Added weather_history.csv to the git tracker
          git add pool_history.csv weather_history.csv
          git commit -m "Update pool and weather telemetry" || exit 0
          git push
